<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nucleo Familiare - Prototype</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #1a1a2e;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .phone-frame {
      width: 360px; height: 800px; background: #fff;
      position: relative; overflow: hidden;
      border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    #app { width: 100%; height: 100%; position: relative; }
    .screen {
      display: none; flex-direction: column; height: 100%;
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    }
    .screen.active { display: flex; }
    .modal-bar {
      background: #fff; border-bottom: 1px solid #cbcfda;
      padding: 12px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0; z-index: 2;
    }
    .modal-bar .back-btn, .modal-bar .close-btn {
      width: 40px; height: 40px; display: flex; align-items: center;
      justify-content: center; border: none; background: none;
      cursor: pointer; border-radius: 50%;
    }
    .modal-bar .back-btn:hover, .modal-bar .close-btn:hover { background: #f5f5f5; }
    .modal-bar .back-btn svg, .modal-bar .close-btn svg { width: 24px; height: 24px; }
    .modal-bar .title {
      font-size: 16px; font-weight: 700; color: #171f36;
      letter-spacing: 0.15px; flex: 1; padding-left: 4px;
    }
    .progress-bar {
      height: 8px; width: 100%; background: #f1f4fc;
      flex-shrink: 0; z-index: 2;
    }
    .progress-bar .fill {
      height: 100%; background: #5acd9e; transition: width 0.3s ease;
    }
    .body-content {
      flex: 1; overflow-y: auto; padding: 32px 16px 120px;
      background: #fff; z-index: 1;
    }
    .body-content.bg-gray { background: #f9fafa; padding-top: 16px; }
    .heading-h5, .heading-h6 {
      font-size: 20px; font-weight: 700; line-height: 32px; color: #171f36;
    }
    .body-text, .subtitle-text {
      font-size: 16px; font-weight: 400; line-height: 21px;
      color: #171f36; letter-spacing: 0.15px;
    }
    .subtitle-text { margin-top: 4px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .help-btn {
      width: 40px; height: 40px; background: #f8f7fe; border: none;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; cursor: pointer;
    }
    .help-btn svg { width: 24px; height: 24px; color: #7c6dd8; }
    .choice-cards { display: flex; gap: 8px; margin-top: 24px; }
    .choice-card {
      flex: 1; background: #fff; border-radius: 8px;
      padding: 8px 4px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      cursor: pointer; border: 2px solid transparent;
      min-height: 110px; transition: all 0.2s;
    }
    .choice-card:hover { border-color: #1246c8; }
    .choice-card.selected { border-color: #1246c8; background: #f1f4fc; }
    .choice-card .icon-circle {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px dashed rgba(23,31,54,0.12); background: #fcfdff;
      display: flex; align-items: center; justify-content: center;
    }
    .choice-card .icon-circle svg { width: 16px; height: 16px; color: #171f36; }
    .choice-card .label {
      font-size: 14px; font-weight: 700; line-height: 22px;
      color: #171f36; text-align: center; letter-spacing: 0.15px;
    }
    .option-list {
      display: flex; flex-direction: column; gap: 12px; margin-top: 24px;
    }
    .option-item {
      background: #fff; border: 1px solid rgba(23,31,54,0.1);
      border-radius: 12px; padding: 4px 12px;
      display: flex; align-items: center; justify-content: space-between;
      min-height: 48px; cursor: pointer; transition: all 0.2s;
    }
    .option-item:hover { border-color: rgba(23,31,54,0.3); }
    .option-item.selected {
      border-color: rgba(23,31,54,0.3); background: #f9fafa;
    }
    .option-item .selected-check {
      width: 16px; height: 16px; flex-shrink: 0; margin-right: 8px; display: none;
    }
    .option-item.selected .selected-check,
    .option-item.multi-selected .selected-check { display: block; }
    .option-item .opt-label {
      font-size: 16px; font-weight: 700; line-height: 28px;
      color: #171f36; letter-spacing: 0.15px; flex: 1; padding: 8px 0;
    }
    .option-item .info-btn {
      width: 40px; height: 40px; background: #f9fafa; border: none;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; cursor: pointer; flex-shrink: 0;
    }
    .option-item .info-btn svg { width: 16px; height: 16px; color: rgba(23,31,54,0.4); }
    .option-item.multi-selected {
      border-color: rgba(23,31,54,0.3); background: #f9fafa;
    }
    .more-options-btn {
      display: flex; align-items: center; gap: 8px;
      justify-content: flex-end; margin-top: 8px;
      background: none; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; color: #1246c8;
      letter-spacing: 0.4px; line-height: 24px;
      padding: 8px; align-self: flex-end;
    }
    .more-options-btn svg { width: 16px; height: 16px; }
    .form-group {
      display: flex; flex-direction: column; gap: 16px; margin-top: 24px;
    }
    .text-field { position: relative; }
    .text-field label {
      position: absolute; top: -1px; left: 12px;
      background: #fff; padding: 0 4px;
      font-size: 12px; font-weight: 400; color: rgba(23,31,54,0.7);
      letter-spacing: 0.4px; line-height: 20px;
      z-index: 1; transform: translateY(-50%);
    }
    .text-field input, .text-field select {
      width: 100%; border: 1px solid rgba(23,31,54,0.12);
      border-radius: 8px; padding: 16px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 400; color: #171f36;
      letter-spacing: 0.15px; line-height: 21px;
      outline: none; background: #fff;
      -webkit-appearance: none;
    }
    .text-field input::placeholder { color: rgba(23,31,54,0.4); }
    .text-field input:focus, .text-field select:focus {
      border-color: #1246c8; border-width: 2px; padding: 15px 11px;
    }
    .text-field .input-wrapper { position: relative; }
    .text-field .end-icon {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); color: rgba(23,31,54,0.5);
    }
    .text-field .end-icon svg { width: 24px; height: 24px; }
    .bottom-buttons {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; gap: 8px; padding: 16px;
      padding-bottom: 40px; background: #fff; z-index: 10;
    }
    .btn {
      flex: 1; min-height: 48px; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; letter-spacing: 0.46px;
      line-height: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
      background: #fff; color: #1246c8;
      border: 1px solid rgba(18,70,200,0.5);
    }
    .btn-primary { background: #1246c8; color: #fff; border: none; }
    .btn svg { width: 18px; height: 18px; }
    /* Notification cards (Te + members) */
    .notif-card {
      background: #fff; border-radius: 12px;
      border: 1px solid rgba(23,31,54,0.12);
      padding: 16px; display: flex; align-items: center;
      gap: 12px;
    }
    .notif-card .card-icon {
      position: relative; flex-shrink: 0; width: 32px; height: 32px;
    }
    .notif-card .card-icon .icon-circle-blue {
      width: 32px; height: 32px; background: #f1f4fc;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center;
    }
    .notif-card .card-icon .icon-circle-blue svg {
      width: 16px; height: 16px;
    }
    .notif-card .card-icon .icon-circle-dashed {
      width: 32px; height: 32px; background: #fcfdff;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center;
      border: 1px dashed rgba(23,31,54,0.1);
    }
    .notif-card .card-icon .icon-circle-dashed svg {
      width: 16px; height: 16px;
    }
    .notif-card .card-icon .badge-dot {
      position: absolute; top: -3px; right: -3px;
      width: 8px; height: 8px; background: #d72f60;
      border-radius: 50%;
    }
    .notif-card .card-icon .badge-check-sm {
      position: absolute; top: -4px; right: -6px;
      width: 20px; height: 20px;
    }
    .notif-card .card-text { flex: 1; min-width: 0; }
    .notif-card .card-name {
      font-size: 14px; font-weight: 700; color: #000;
      letter-spacing: 0.15px; line-height: 22px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .notif-card .card-rel {
      font-size: 12px; font-weight: 400; color: rgba(23,31,54,0.7);
      letter-spacing: 0.4px; line-height: 20px;
    }
    .notif-card .card-actions {
      display: flex; gap: 24px; align-items: center; flex-shrink: 0;
    }
    .notif-card .card-action-btn {
      width: 40px; height: 40px; border: none; background: none;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .notif-card .card-action-btn:hover { background: #f5f5f5; }
    .notif-card .card-action-btn svg { width: 24px; height: 24px; color: #171f36; }

    .section-label {
      font-size: 14px; font-weight: 700; color: #171f36;
      letter-spacing: 0.15px; line-height: 22px;
    }
    .add-member-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 8px 16px; min-height: 48px;
      background: #1246c8; border: none;
      border-radius: 8px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; color: #fff;
      letter-spacing: 0.46px; line-height: 26px;
      transition: opacity 0.2s;
    }
    .add-member-btn:hover { opacity: 0.9; }
    .add-member-btn svg { width: 18px; height: 18px; }

    /* Solo te card */
    .solo-card {
      background: #fff; border: 1px solid rgba(23,31,54,0.12);
      border-radius: 12px; padding: 24px 16px;
      display: flex; flex-direction: column; align-items: center;
      gap: 4px;
    }
    .solo-card .solo-icon {
      position: relative; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
    }
    .solo-card .solo-icon .user-circle {
      width: 40px; height: 40px; background: #f1f4fc;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center;
    }
    .solo-card .solo-icon .user-circle svg { width: 24px; height: 24px; color: #1246c8; }
    .solo-card .solo-icon .badge-check {
      position: absolute; top: -3px; right: -6px;
      width: 18px; height: 18px;
    }
    .solo-card .solo-name {
      font-size: 16px; font-weight: 700; color: #000;
      text-align: center; margin-top: 4px;
    }
    .solo-card .solo-desc {
      font-size: 14px; font-weight: 400; color: #171f36;
      text-align: center; line-height: 21px; letter-spacing: 0.17px;
    }

    /* Info alert */
    .info-alert {
      background: #f1f4fc; border-radius: 8px;
      padding: 8px 16px; display: flex; gap: 12px;
      align-items: center;
    }
    .info-alert .alert-icon {
      width: 24px; height: 24px; flex-shrink: 0; color: #1246c8;
    }
    .info-alert .alert-text {
      font-size: 14px; font-weight: 400; color: #1246c8;
      line-height: 21px; letter-spacing: 0.17px;
    }
    .boolean-list { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
    .bool-card {
      background: #fff; border: 1px solid rgba(23,31,54,0.1);
      border-radius: 12px; padding: 4px 12px;
      display: flex; align-items: center;
      cursor: pointer; transition: all 0.2s;
      font-size: 16px; font-weight: 700; line-height: 28px;
      color: #171f36; letter-spacing: 0.15px;
      min-height: 48px;
    }
    .bool-card span { padding: 8px 0; }
    .bool-card:hover { border-color: rgba(23,31,54,0.3); }
    .bool-card.selected { border-color: rgba(23,31,54,0.3); background: #f9fafa; }
    .bool-card .selected-check {
      width: 16px; height: 16px; flex-shrink: 0; margin-right: 8px; display: none;
    }
    .bool-card.selected .selected-check { display: block; }
    .screen { animation: slideIn 0.25s ease-out; }
    @keyframes slideIn {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .text-field.error input { border-color: #d32f2f; }
    .text-field .error-text {
      font-size: 12px; color: #d32f2f; margin-top: 4px;
      padding-left: 12px; display: none;
    }
    .text-field.error .error-text { display: block; }

    /* Bottom Sheet / Guided Mode */
    .bottomsheet-backdrop {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(23,31,54,0.5); z-index: 50;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .bottomsheet-backdrop.open { opacity: 1; pointer-events: auto; }
    .bottomsheet {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: #fff; z-index: 51;
      border-radius: 12px 12px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      max-height: 70%; display: flex; flex-direction: column;
    }
    .bottomsheet.open { transform: translateY(0); }
    .bottomsheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px; border-bottom: 1px solid #cbcfda; flex-shrink: 0;
    }
    .bottomsheet-header .bs-title {
      display: flex; align-items: center; gap: 8px;
      flex: 1; padding-left: 4px;
    }
    .bottomsheet-header .bs-icon {
      width: 36px; height: 36px; background: #f8f7fe;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .bottomsheet-header .bs-icon svg { width: 20px; height: 20px; color: #7c6dd8; }
    .bottomsheet-header .bs-name {
      font-size: 16px; font-weight: 700; color: #171f36;
      letter-spacing: 0.15px;
    }
    .bottomsheet-header .bs-close {
      width: 40px; height: 40px; border: none; background: none;
      cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .bottomsheet-header .bs-close:hover { background: #f5f5f5; }
    .bottomsheet-header .bs-close svg { width: 24px; height: 24px; }
    .bottomsheet-body {
      padding: 24px 16px 64px; overflow-y: auto;
      font-size: 16px; font-weight: 400; line-height: 21px;
      color: #171f36; letter-spacing: 0.15px;
    }
    .bottomsheet-body strong, .bottomsheet-body b {
      font-weight: 700;
    }
    .bottomsheet-body ul {
      margin: 8px 0; padding-left: 20px;
    }
    .bottomsheet-body li { margin-bottom: 4px; }
    .bottomsheet-body p { margin-bottom: 8px; }
    .bottomsheet-body .bs-example {
      background: #f9fafa; border-radius: 8px;
      padding: 12px; margin-top: 12px;
      font-size: 14px; line-height: 20px;
      color: rgba(23,31,54,0.7);
    }

    /* Delete confirmation dialog */
    .dialog-backdrop {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(23,31,54,0.5); z-index: 60;
      display: none; align-items: center; justify-content: center;
    }
    .dialog-backdrop.open { display: flex; }
    .dialog {
      background: #fff; border: 1px solid rgba(23,31,54,0.12);
      border-radius: 12px; padding: 24px 16px;
      width: 328px; display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .dialog .dialog-icon {
      width: 48px; height: 48px; color: #22c55e;
    }
    .dialog .dialog-title {
      font-size: 20px; font-weight: 700; line-height: 32px;
      color: #171f36; text-align: center; width: 100%;
    }
    .dialog .dialog-desc {
      font-size: 14px; font-weight: 400; line-height: 21px;
      color: rgba(23,31,54,0.7); text-align: center;
      letter-spacing: 0.17px; width: 100%;
    }
    .dialog .dialog-actions {
      display: flex; gap: 12px; align-items: center;
      justify-content: center; margin-top: 12px;
    }
    .dialog .dialog-btn {
      min-height: 40px; min-width: 64px; border-radius: 8px;
      padding: 8px 12px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; letter-spacing: 0.4px;
      line-height: 24px; cursor: pointer; transition: opacity 0.2s;
    }
    .dialog .dialog-btn:hover { opacity: 0.9; }
    .dialog .dialog-btn-outline {
      background: #fff; color: #1246c8;
      border: 1px solid rgba(18,70,200,0.5);
    }
    .dialog .dialog-btn-primary {
      background: #1246c8; color: #fff; border: none;
    }

    /* Toast */
    .toast {
      position: absolute; bottom: 100px; right: 16px;
      background: #22885F; color: #fff; border-radius: 8px;
      padding: 8px 16px; font-size: 14px; font-weight: 500;
      letter-spacing: 0.15px; line-height: 22px;
      z-index: 55; opacity: 0; transition: opacity 0.15s ease;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* Question help button (inline with title) */
    .title-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    .title-row .heading-h6 { flex: 1; }
  </style>
</head>
<body>

<div class="phone-frame">
  <div id="app"></div>
  <div class="toast" id="toast"></div>
  <div id="delete-dialog-backdrop" class="dialog-backdrop" onclick="closeDeleteDialog()">
    <div class="dialog" onclick="event.stopPropagation()">
      <svg class="dialog-icon" viewBox="0 0 48 48" fill="none">
        <path d="M24 4C19.6 4 16 7.6 16 12v8l-4 4v2h24v-2l-4-4v-8c0-4.4-3.6-8-8-8z" fill="#22c55e" opacity="0.3"/>
        <path d="M24 4C19.6 4 16 7.6 16 12v8l-4 4v2h24v-2l-4-4v-8c0-4.4-3.6-8-8-8z" stroke="#22c55e" stroke-width="1.5" fill="none"/>
        <path d="M20 32a4 4 0 008 0" stroke="#22c55e" stroke-width="1.5" fill="none"/>
        <path d="M24 16v8" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="24" cy="28" r="1.5" fill="#22c55e"/>
      </svg>
      <div class="dialog-title" id="delete-dialog-title">Vuoi davvero rimuovere {nome}?</div>
      <div class="dialog-desc">Se rimuovi un familiare dal nucleo perderai tutti i dati associati.</div>
      <div class="dialog-actions">
        <button class="dialog-btn dialog-btn-outline" onclick="closeDeleteDialog()">No, annulla</button>
        <button class="dialog-btn dialog-btn-primary" onclick="confirmDelete()">Sì, rimuovi</button>
      </div>
    </div>
  </div>
  <div id="bs-backdrop" class="bottomsheet-backdrop" onclick="closeBottomSheet()"></div>
  <div id="bs-sheet" class="bottomsheet">
    <div class="bottomsheet-header">
      <div class="bs-title">
        <div class="bs-icon">
          <svg viewBox="0 0 24 24" fill="#7c6dd8" stroke="none"><path d="M12 2l2.09 6.26L20.18 9l-5.09 3.74L17.18 19 12 15.27 6.82 19l2.09-6.26L3.82 9l6.09-.74z"/></svg>
        </div>
        <span class="bs-name">Clara</span>
      </div>
      <button class="bs-close" onclick="closeBottomSheet()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="bottomsheet-body" id="bs-body"></div>
  </div>
</div>

<script>
// ============================================================
// FLOW ENGINE - Data-driven multi-step questionnaire
// ============================================================

// Bottom sheet
function openBottomSheet(html) {
  document.getElementById('bs-body').innerHTML = html;
  document.getElementById('bs-backdrop').classList.add('open');
  document.getElementById('bs-sheet').classList.add('open');
}
function closeBottomSheet() {
  document.getElementById('bs-backdrop').classList.remove('open');
  document.getElementById('bs-sheet').classList.remove('open');
}

// Guided mode help button HTML
function helpBtn(guidedKey) {
  return `<button class="help-btn" onclick="event.stopPropagation(); showGuide('${guidedKey}')" style="flex-shrink:0">${ICON_HELP}</button>`;
}

// All guided-mode explanations
const GUIDES = {
  nucleo_familiare: `<b>Chi fa parte del tuo nucleo familiare?</b><ul><li>Le persone con cui vivi e che sono familiari (es. genitori, figli, partner).</li><li>Anche il coniuge che vive altrove.</li><li>Anche i figli che vivono fuori casa, se non hanno reddito o famiglia propria.</li></ul>`,

  rel_coniuge: `<b>Chi è il coniuge?</b><p>La persona con cui sei sposato/a.</p>`,

  rel_convivente: `<b>Chi è l'unito civilmente?</b><p>La persona con cui hai una unione civile. L'unione civile è una forma di legame legale simile al matrimonio, ma pensata per coppie dello stesso sesso. È riconosciuta dalla legge come una relazione ufficiale, con diritti e doveri simili a quelli del matrimonio.</p>`,

  parents_relationship: `Se siete ancora sposati o avete un'unione civile ufficiale, anche se non vivete insieme, rispondi <b>SÌ</b>.<br><br>Se avete ottenuto una separazione legale (giudiziale o consensuale omologata da un giudice) o siete divorziati, rispondi <b>NO</b>.<br><br>Se non avete mai avuto un matrimonio o un'unione civile, rispondi <b>NO</b>.`,

  address_type: `<p>Indica il luogo in cui vive ora. Non considerare situazioni temporanee come vacanze, soggiorni brevi in hotel o ospitalità momentanea.</p><ul><li>Se abita in una casa o appartamento privato (da solo, con la tua famiglia o con coinquilini), scegli l'opzione 1.</li><li>Se vive in una struttura dove abitano molte persone insieme con cui non ha legami, come una casa di riposo (RSA), un centro di accoglienza, un convento o un carcere, scegli l'opzione 2.</li><li>Se non ha una casa fissa e vive per esempio in strada, in una baracca, in una tenda, o in un mezzo come camper, roulotte o barca, scegli l'opzione 3.</li></ul>`,

  care_facility: `Rispondi <b>SÌ</b> se la persona è ricoverata presso residenze socio-sanitarie assistenziali come RSA, RSSA o residenze protette.`,

  disability: `<b>Cos'è l'invalidità civile?</b><p>L'invalidità civile è un riconoscimento per chi ha una condizione di salute, fisica o mentale, che rende più difficile lavorare o svolgere le attività quotidiane. Per ottenerla, la persona deve avere una riduzione della capacità lavorativa di almeno un terzo (cioè il 33%) rispetto a una persona senza difficoltà di salute.</p><div class="bs-example">Giulia ha un forte dolore cronico alla schiena. Dopo la visita, la commissione medica le rilascia un verbale che attesta una invalidità civile del 40%. Questo riconoscimento le permette di essere considerata persona con disabilità e di accedere ad alcune agevolazioni e benefici previsti dalla legge.</div>`,

  disability_pct: `<b>Cos'è l'invalidità civile con percentuale?</b><p>È un certificato che dice quanto la tua salute ti rende difficile lavorare o fare le cose di ogni giorno. La difficoltà è scritta con una percentuale.</p>`,

  disability_blind: `<b>Chi è considerato cieco civile?</b><p>È la persona che ha ricevuto il riconoscimento dato a chi non vede bene o non vede più, in modo totale o quasi totale.</p>`,

  disability_deaf: `<b>Chi è considerato sordo (ex sordomuto)?</b><p>È la persona che ha ricevuto il riconoscimento dato a chi non sente dalla nascita o ha perso l'udito in modo grave e per sempre.</p>`,

  disability_not_self_sufficient: `<b>Cosa vuol dire "non autosufficienza"?</b><p>Non è autosufficiente una persona che ha bisogno di assistenza in modo continuato (per lavarsi, vestirsi, nutrirsi o muoversi) a causa di malattie croniche, anzianità o problemi psico-fisici.</p>`,

  working_parents: `<p>Questa informazione ci serve per calcolare correttamente l'ISEE familiare.</p><p>Per l'ISEE si considera sempre la situazione di due anni prima.</p>`,

  activity_caregiving: `<b>Chi assiste un familiare (caregiver)?</b><p>Colui che si occupa ogni giorno di un parente malato, disabile o anziano che non può vivere da solo. Non riceve uno stipendio: lo fa per dovere o per affetto.</p>`,

  employment_subordinato: `<b>Cos'è il lavoro dipendente?</b><p>Lavori con un contratto come impiegato, operaio, commesso, infermiere o altre figure assunte da un'azienda o ente.</p>`,

  employment_autonomo: `<b>Cos'è il lavoro autonomo?</b><p>Lavori per conto tuo, con o senza partita IVA. Per esempio: libero professionista, artigiano o piccoli lavori come baby-sitting con il Libretto famiglia.</p>`,

  employment_parasubordinato: `<b>Cos'è il lavoro parasubordinato?</b><p>Lavori per qualcuno con un incarico regolare, ma senza essere un dipendente. Per esempio: collaboratore a progetto o amministratore in una società.</p>`,

  employment_atipico: `<b>Cos'è il lavoro atipico?</b><p>Fai attività particolari e temporanee, diverse dal lavoro normale. Per esempio: stage o tirocinio per fare esperienza, dottorato o specializzazione con borsa di studio, piccoli lavori occasionali pagati con il Libretto famiglia/PrestO.</p>`,

  contract_apprendistato: `<b>Cos'è l'apprendistato?</b><p>Lavori mentre impari un mestiere, con contratto che prevede formazione e pratica.</p><div class="bs-example">Esempio: sei apprendista parrucchiere o meccanico.</div>`,

  contract_intermittente: `<b>Cos'è il lavoro intermittente/a chiamata?</b><p>Lavori solo quando vieni chiamato, senza orari fissi.</p><div class="bs-example">Esempio: lavori come cameriere nei weekend o come addetto durante eventi.</div>`,

  quasi_co_co_co: `<b>Cos'è la collaborazione coordinata e continuativa (co.co.co.)?</b><p>Un'attività continuativa per lo stesso committente, senza partita IVA e senza contratto da dipendente.</p><div class="bs-example">Esempio: collabori ogni mese con un'azienda come consulente.</div>`,

  quasi_incarico: `<b>Cos'è l'amministratore/revisore/consigliere/altro incarico in società/enti?</b><p>Un ruolo ufficiale in una società o in un ente, con compenso ma senza rapporto da dipendente.</p><div class="bs-example">Esempio: sei amministratore di una Srl o consigliere in un'associazione.</div>`,

  quasi_sportivo: `<b>Cos'è la collaborazione sportiva dilettantistica?</b><p>Attività svolta per associazioni o società sportive dilettantistiche, con compensi specifici.</p><div class="bs-example">Esempio: alleni una squadra giovanile o lavori come istruttore in palestra.</div>`,

  self_professionista_albo: `<b>Professionista con partita IVA iscritto ad albo</b><p>Si tratta di un'attività svolta in proprio nell'ambito di una professione regolamentata da un albo.</p><div class="bs-example">Esempio: avvocato, architetto, medico.</div>`,

  self_professionista_non_albo: `<b>Professionista con partita IVA non iscritto ad albo</b><p>Riguarda attività indipendenti non soggette a un albo professionale.</p><div class="bs-example">Esempio: grafico, consulente, traduttore.</div>`,

  self_occasionale: `<b>Cos'è il lavoro autonomo occasionale?</b><p>Consiste in attività saltuarie e di breve durata, senza partita IVA e con un accordo diretto tra te e il committente.</p><div class="bs-example">Esempio: traduzione di un documento, consulenza una tantum.</div>`,

  self_impresa_familiare: `<b>Cos'è il lavoro come collaboratore in impresa familiare?</b><p>Indica il contributo continuativo all'attività economica di un familiare, con la possibilità di partecipare agli utili, senza avere una tua partita IVA.</p>`,

  atypical_stage: `<b>Cos'è lo stage o tirocinio?</b><p>Fai un'esperienza formativa temporanea per fare pratica.</p><div class="bs-example">Esempio: tirocinio universitario in azienda.</div>`,

  atypical_dottorato: `<b>Cos'è il dottorato/specializzazione con borsa di studio o contratto di formazione?</b><p>Segui un percorso di ricerca o specializzazione con un sostegno economico.</p><div class="bs-example">Esempio: dottorato con borsa di studio.</div>`,

  atypical_libretto: `<b>Cos'è il Libretto famiglia/PrestO (ex voucher)?</b><p>Svolgi piccoli lavori pagati con buoni occasionali.</p><div class="bs-example">Esempio: baby-sitting o ripetizioni.</div>`,

  unemployment: `<b>Cos'è la NASpI?</b><p>È un aiuto economico mensile per chi ha perso un lavoro dipendente in modo involontario.</p><b>Cos'è la DIS-COLL?</b><p>È un aiuto economico mensile per collaboratori (co.co.co., assegni di ricerca, dottorandi) che hanno perso il lavoro.</p><b>Cos'è la Disoccupazione agricola?</b><p>È un aiuto economico annuale per chi ha lavorato nel settore agricolo e ha perso il lavoro o ha avuto poche giornate lavorate nell'anno.</p>`,

  study_cpia: `<b>Cos'è un CPIA (Centro per l'Istruzione degli Adulti)?</b><p>È una scuola pubblica per adulti e ragazzi dai 16 anni in su, che aiuta a studiare e migliorare le proprie competenze.</p><p>Puoi andare in un CPIA se:</p><ul><li>sei un adulto e vuoi prendere il diploma di scuola media o superiore;</li><li>sei straniero e vuoi imparare meglio l'italiano;</li><li>hai almeno 16 anni, il diploma di scuola media e non puoi frequentare la scuola di giorno.</li></ul>`,

  rel_dynamics_maintenance: `<b>Versa assegni di mantenimento stabiliti dal giudice:</b><p>paga regolarmente dei soldi per aiutare a crescere il figlio, come deciso da un giudice.</p>`,

  rel_dynamics_no_rights: `<b>Non ha più diritti legali sul figlio:</b><p>non può prendere decisioni sul figlio, perché un giudice lo ha deciso.</p>`,

  rel_dynamics_removal: `<b>È stato allontanato legalmente dalla casa familiare:</b><p>un giudice ha deciso che non può vivere nella casa dove sta il figlio.</p>`,

  rel_dynamics_no_contact: `<b>Non ha rapporti né economici né affettivi con il figlio (per decisione ufficiale):</b><p>non dà soldi e non ha contatti con il figlio. Per "decisione ufficiale" si intende una scelta certificata da un giudice o da un altro ufficiale pubblico.</p>`,

// State
let members = [];
let current = {}; // current member being added
let history = []; // navigation history for back button
const app = document.getElementById('app');

function n(name) { return current.name || name || 'il familiare'; }
function age() {
  if (!current.birthdate) return 0;
  const bd = new Date(current.birthdate);
  const today = new Date();
  let a = today.getFullYear() - bd.getFullYear();
  if (today.getMonth() < bd.getMonth() || (today.getMonth() === bd.getMonth() && today.getDate() < bd.getDate())) a--;
  return a;
}
function yearMinus2() { return new Date().getFullYear() - 2; }

function isChild() {
  return ['Figlio o figlia naturale', 'Figlio o figlia adottiva', 'Minore in affido'].includes(current.relationship);
}
function needsAdoption() {
  return ['Figlio o figlia adottiva', 'Minore in affido'].includes(current.relationship);
}

function renderScreen({ headerTitle, showClose, showBack, backFn, progress, body, buttons }) {
  app.innerHTML = `
    <div class="screen active">
      <div class="modal-bar">
        ${showBack ? `<button class="back-btn" onclick="(${backFn || 'showEmpty'})()">${ICON_ARROW_LEFT}</button>` : ''}
        <span class="title">${headerTitle}</span>
        ${showClose ? `<button class="close-btn" onclick="dropSurvey()">${ICON_CLOSE}</button>` : '<div style="width:40px"></div>'}
      </div>
      ${progress !== undefined ? `<div class="progress-bar"><div class="fill" style="width:${progress}%"></div></div>` : ''}
      <div class="body-content${progress === undefined ? ' bg-gray' : ''}">${body}</div>
      ${buttons ? `<div class="bottom-buttons">${buttons}</div>` : ''}
    </div>`;
}

window.dropSurvey = function() {
  // Save partial member if we have at least a name or relationship
  if (current.name || current.relationship) {
    // Check if we're editing an existing incomplete member (by _editIndex)
    if (current._editIndex !== undefined) {
      // Replace the member at that index
      members[current._editIndex] = { ...current, complete: false };
      delete members[current._editIndex]._editIndex;
    } else {
      members.push({ ...current, complete: false });
    }
  }
  current = {};
  soloMode = members.length === 0 ? soloMode : false;
  showEmpty();
};

function btnBack(fn) {
  return `<button class="btn btn-outline" onclick="${fn}()">${ICON_BACK} Indietro</button>`;
}
function btnNext(id, fn, disabled = true) {
  return `<button class="btn btn-primary" id="${id}" ${disabled ? 'disabled' : ''} onclick="${fn}()">Avanti ${ICON_FWD}</button>`;
}

function booleanQuestion({ title, description, progress, headerTitle, yesLabel, noLabel, onYes, onNo, backFn, guide, preselect }) {
  window._boolYesFn = onYes;
  window._boolNoFn = onNo;
  window._boolValue = preselect !== undefined ? (preselect ? 'yes' : 'no') : null;

  renderScreen({
    headerTitle: headerTitle || `Dati di ${n()}`,
    showClose: true, progress: progress || 30,
    body: `
      <div class="title-row">
        <h2 class="heading-h6">${title}</h2>
        ${guide ? helpBtn(guide) : ''}
      </div>
      ${description ? `<p class="subtitle-text">${description}</p>` : ''}
      <div class="boolean-list">
        <div class="bool-card${preselect === true ? ' selected' : ''}" id="bool-yes" onclick="selectBool('yes')">${ICON_CHECK_CIRCLE}<span>${yesLabel || 'Sì'}</span></div>
        <div class="bool-card${preselect === false ? ' selected' : ''}" id="bool-no" onclick="selectBool('no')">${ICON_CHECK_CIRCLE}<span>${noLabel || 'No'}</span></div>
      </div>`,
    buttons: `${btnBack(backFn || 'showEmpty')} ${btnNext('btn-bool-next', 'handleBoolNext', preselect === undefined)}`
  });
}

window.selectBool = function(val) {
  window._boolValue = val;
  document.getElementById('bool-yes').classList.toggle('selected', val === 'yes');
  document.getElementById('bool-no').classList.toggle('selected', val === 'no');
  document.getElementById('btn-bool-next').disabled = false;
};

window.handleBoolNext = function() {
  if (!window._boolValue) return;
  if (window._boolValue === 'yes') window[window._boolYesFn]();
  else window[window._boolNoFn]();
};

function listQuestion({ title, description, progress, headerTitle, options, onSelect, backFn, multiSelect, guide, preselect }) {
  window._listOptions = options;
  window._listOnSelect = onSelect;
  window._listMulti = multiSelect;

  // Compute preselected indices
  let preIndices = [];
  if (preselect !== undefined && preselect !== null) {
    if (multiSelect && Array.isArray(preselect)) {
      preIndices = options.map((o, i) => preselect.includes(o.value) ? i : -1).filter(i => i >= 0);
    } else if (!multiSelect) {
      const idx = options.findIndex(o => o.value === preselect);
      if (idx >= 0) preIndices = [idx];
    }
  }
  window._listSelection = [...preIndices];

  const optionsHtml = options.map((o, i) => {
    const isSel = preIndices.includes(i);
    const cls = multiSelect ? (isSel ? ' multi-selected' : '') : (isSel ? ' selected' : '');
    return `
    <div class="option-item${cls}" id="opt-${i}" onclick="handleListSelect(${i})">
      ${ICON_CHECK_CIRCLE}
      <span class="opt-label">${o.label}</span>
      ${o.guide ? `<button class="info-btn" onclick="event.stopPropagation(); showGuide('${o.guide}')">${ICON_HELP}</button>` : ''}
    </div>`;
  }).join('');

  const hasPreselection = preIndices.length > 0;

  renderScreen({
    headerTitle: headerTitle || `Dati di ${n()}`,
    showClose: true, progress: progress || 50,
    body: `
      <div class="title-row">
        <h2 class="heading-h6">${title}</h2>
        ${guide ? helpBtn(guide) : ''}
      </div>
      ${description ? `<p class="subtitle-text">${description}</p>` : ''}
      <div class="option-list">${optionsHtml}</div>`,
    buttons: `${btnBack(backFn || 'showEmpty')} ${btnNext('btn-list-next', 'handleListNext', !hasPreselection)}`
  });
}

window.handleListSelect = function(idx) {
  if (window._listMulti) {
    const pos = window._listSelection.indexOf(idx);
    if (pos >= 0) window._listSelection.splice(pos, 1);
    else window._listSelection.push(idx);
    document.querySelectorAll('.option-item').forEach((el, i) => {
      el.classList.toggle('multi-selected', window._listSelection.includes(i));
    });
    document.getElementById('btn-list-next').disabled = window._listSelection.length === 0;
  } else {
    window._listSelection = [idx];
    document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
    document.getElementById('opt-' + idx).classList.add('selected');
    document.getElementById('btn-list-next').disabled = false;
  }
};

window.handleListNext = function() {
  if (!window._listSelection || window._listSelection.length === 0) return;
  if (window._listMulti) {
    const values = window._listSelection.map(i => window._listOptions[i].value);
    const labels = window._listSelection.map(i => window._listOptions[i].label);
    window[window._listOnSelect](values, labels);
  } else {
    const opt = window._listOptions[window._listSelection[0]];
    window[window._listOnSelect](opt.value, opt.label);
  }
};

      </div>`;
  } else {
    // Has members
    bodyContent = `
      <div class="notif-card">
        <div class="card-icon">
          <div class="icon-circle-blue">${ICON_USER_SOLID}</div>
          ${ICON_BADGE_CHECK_SM}
        </div>

        <div class="notif-card" style="margin-top:12px">
          <div class="card-icon">
            ${m.complete

          <div class="card-text">

            <button class="card-action-btn" onclick="editMember(${i})">${ICON_PEN}</button>

    bottomBtn = `
      <div class="bottom-buttons" style="justify-content:center">
        <button class="add-member-btn" onclick="startAddMember()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Aggiungi un familiare
        </button>

  app.innerHTML = `
    <div class="screen active">
      <div class="modal-bar">
        <button class="back-btn" onclick="alert('Chiusura del flusso')">${ICON_ARROW_LEFT}</button>
        <span class="title">Nucleo familiare</span>
        <div style="width:40px"></div>
      </div>
      <div class="body-content bg-gray" style="${bottomBtn ? 'padding-bottom:120px' : ''}">

window.selectHousehold = function(type) {
  if (type === 'solo') {
    soloMode = true;
    showEmpty();
  } else {
    startAddMember();
  }
};

window._pendingDeleteIndex = null;

window.deleteMember = function(i) {
  window._pendingDeleteIndex = i;
  const name = members[i].name || 'questo familiare';
  document.getElementById('delete-dialog-title').textContent = `Vuoi davvero rimuovere ${name}?`;
  document.getElementById('delete-dialog-backdrop').classList.add('open');
};

window.closeDeleteDialog = function() {
  document.getElementById('delete-dialog-backdrop').classList.remove('open');
  window._pendingDeleteIndex = null;
};

window.confirmDelete = function() {
  if (window._pendingDeleteIndex !== null) {
    members.splice(window._pendingDeleteIndex, 1);
    if (members.length === 0) soloMode = false;
    window._pendingDeleteIndex = null;
  }
  document.getElementById('delete-dialog-backdrop').classList.remove('open');
  showEmpty();
};

window.editMember = function(i) {
  const member = members[i];
  members.splice(i, 1);
  current = { ...member, _editIndex: undefined };
  // Store the position so dropSurvey can put it back
  current._editIndex = i;
  showRelationshipType();
};

// --- START ADD MEMBER ---
function startAddMember() {
  current = {};
  history = [];
  showRelationshipType();
}

// --- STEP: Relationship Type ---
function showRelationshipType() {
  const mainRels = [
    { label: 'Coniuge o unito civilmente', guide: 'rel_coniuge' },
    { label: 'Convivente di fatto', guide: 'rel_convivente' },
    { label: 'Figlio o figlia naturale' },
    { label: 'Figlio o figlia adottiva' },
    { label: 'Minore in affido' },
    { label: 'Genitore' },
  ];
  const extraRels = [
    { label: 'Fratello o sorella' },
    { label: 'Nonno o nonna' },
    { label: 'Nipote' },
    { label: 'Zio o zia' },
    { label: 'Cugino o cugina' },
    { label: 'Altro' },
  ];
  const allRels = [...mainRels, ...extraRels];
  const preIdx = current.relationship ? allRels.findIndex(r => r.label === current.relationship) : -1;
  const showExtra = preIdx >= mainRels.length; // auto-expand if preselection is in extra

  renderScreen({
    headerTitle: 'Aggiungi familiare', showClose: true, progress: 10,
    body: `
      <h2 class="heading-h6">Chi vuoi aggiungere?</h2>
      <p class="subtitle-text">Aggiungi un familiare alla volta</p>
      <div class="option-list">
        ${mainRels.map((r, i) => `
          <div class="option-item${i === preIdx ? ' selected' : ''}" id="rel-${i}" onclick="pickRelationship('${r.label}', ${i})">
            ${ICON_CHECK_CIRCLE}
            <span class="opt-label">${r.label}</span>
            ${r.guide ? `<button class="info-btn" onclick="event.stopPropagation(); showGuide('${r.guide}')">${ICON_HELP}</button>` : ''}
          </div>`).join('')}
        <div id="extra-rels" style="display:${showExtra ? 'contents' : 'none'}">
          ${extraRels.map((r, ei) => {
            const i = mainRels.length + ei;
            return `<div class="option-item${i === preIdx ? ' selected' : ''}" id="rel-${i}" onclick="pickRelationship('${r.label}', ${i})">
              ${ICON_CHECK_CIRCLE}
              <span class="opt-label">${r.label}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      <button class="more-options-btn" id="btn-more-options" style="display:${showExtra ? 'none' : 'flex'}" onclick="expandRelOptions()">Altre opzioni <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>`,
    buttons: `${btnBack('showEmpty')} ${btnNext('btn-rel', 'goToPersonalData', preIdx < 0)}`
  });
}

window.expandRelOptions = function() {
  document.getElementById('extra-rels').style.display = 'contents';
  document.getElementById('btn-more-options').style.display = 'none';
};

window.pickRelationship = function(rel, idx) {
  current.relationship = rel;
  document.querySelectorAll('.option-item').forEach(e => e.classList.remove('selected'));
  const el = document.getElementById('rel-' + idx);
  if (el) el.classList.add('selected');
  document.getElementById('btn-rel').disabled = false;
};

window.goToPersonalData = function() {
  if (!current.relationship) return;
  showPersonalData();
};

// --- STEP: Personal Data (Name + Birthdate) ---
function showPersonalData() {
  renderScreen({
    headerTitle: 'Aggiungi familiare', showClose: true, progress: 15,
    body: `
      <h2 class="heading-h6">Dati del familiare</h2>
      <div class="form-group">
        <div class="text-field">
          <div class="input-wrapper">
            <input type="text" id="input-name" placeholder="Nome del familiare" value="${current.name || ''}" oninput="validatePD()">
            <label>Nome</label>
          </div>
        </div>
        <div class="text-field">
          <div class="input-wrapper">
            <input type="date" id="input-bd" value="${current.birthdate || ''}" oninput="validatePD()">
            <label>Data di nascita</label>
          </div>
        </div>
      </div>`,
    buttons: `${btnBack('showRelationshipType')} ${btnNext('btn-pd', 'handlePDNext')}`
  });
  validatePD();
}

window.validatePD = function() {
  const name = document.getElementById('input-name').value.trim();
  const bd = document.getElementById('input-bd').value;
  current.name = name;
  current.birthdate = bd;
  document.getElementById('btn-pd').disabled = !(name && bd);
};

window.handlePDNext = function() {
  if (!current.name || !current.birthdate) return;
  if (needsAdoption()) showAdoptionYear();
  else if (isChild()) afterAdoptionOrChild();
  else showLivesWithUser(); // Coniuge, Convivente, Genitore -> skip to "vive con te?"
};

// --- STEP: Adoption Year ---
function showAdoptionYear() {
  renderScreen({
    headerTitle: `Dati di ${n()}`, showClose: true, progress: 20,
    body: `
      <h2 class="heading-h6">Anno di adozione di ${n()}</h2>
      <p class="subtitle-text">Indica l'anno di ingresso in famiglia (affido preadottivo), non quello della sentenza definitiva.</p>
      <div class="form-group" style="margin-top:40px">
        <div class="text-field">
          <div class="input-wrapper">
            <input type="number" id="input-year" placeholder="es. 2022" min="1900" max="2026" value="${current.adoptionYear || ''}" oninput="validateAY()">
            <label>Anno</label>
            <div class="end-icon">${ICON_CAL}</div>
          </div>
        </div>
      </div>`,
    buttons: `${btnBack('showPersonalData')} ${btnNext('btn-ay', 'handleAYNext')}`
  });
  validateAY();
}

window.validateAY = function() {
  const y = document.getElementById('input-year').value;
  current.adoptionYear = y;
  const valid = y && parseInt(y) >= 1900 && parseInt(y) <= 2026;
  document.getElementById('btn-ay').disabled = !valid;
};

window.handleAYNext = function() {
  afterAdoptionOrChild();
};

// After adoption year (or for biological child) -> age check
function afterAdoptionOrChild() {
  if (age() >= 18) {
    // Adult child -> go directly to parents_relationship
    showParentsRelationship();
  } else {
    // Minor child -> working_parents first
    showWorkingParents();
  }
}

    preselect: current.workingParents,
    onYes: 'workingParentsYes', onNo: 'workingParentsNo',
    backFn: needsAdoption() ? 'showAdoptionYear' : 'showPersonalData'
  });
}

window.workingParentsYes = function() {
  current.workingParents = true;

};

  showParentsRelationship();
};

// --- STEP: Relationship Dynamics (multi-choice) ---
function showRelationshipDynamics() {
  listQuestion({
    title: `L'altro genitore di ${n()}...`,
    progress: 40, headerTitle: `Dati di ${n()}`,
    multiSelect: true,
    options: [

};

// --- STEP: Lives With User ---
function showLivesWithUser() {
  const backFn = isChild()
    ? (current.parentsMarried ? 'showParentsRelationship'

      : current.otherParentStatus === 'none_of_these' ? 'showRelationshipDynamics'
      : 'showOtherParentStatus')
    : 'showPersonalData';

  booleanQuestion({
    title: `${n()} vive con te?`,
    progress: 45, headerTitle: n(),
    preselect: current.livesWithUser,
    onYes: 'livesWithYes', onNo: 'livesWithNo',
    backFn
  });
}

};
window.livesWithNo = function() {

  showAddressType();
};

window.handleAddressType = function(value) {

window.careFacilityYes = function() {

  showDisability();
};
window.careFacilityNo = function() {

  showDisability();
};

// --- STEP: Disability ---
function showDisability() {

window.handleEmploymentType = function(value) {
  current.employmentType = value;
  switch (value) {
    case 'subordinato': showContractType(); break;
    case 'parasubordinato': showQuasiSubType(); break;
    case 'autonomo': showSelfEmploymentType(); break;
    case 'atipico': showAtypicalType(); break;
    default: finishMember(); break;
  }
};

// --- STEP: Employee Contract Type ---
function showContractType() {
  listQuestion({
    title: `Tipo di contratto di ${n()}`,
    progress: 85, headerTitle: `Dati di ${n()}`,
    options: [
      { value: 'tempo_indeterminato', label: 'A tempo indeterminato' },
      { value: 'tempo_determinato', label: 'A tempo determinato' },
      { value: 'apprendistato', label: 'In apprendistato', guide: 'contract_apprendistato' },
      { value: 'intermittente', label: 'Intermittente/a chiamata', guide: 'contract_intermittente' },
      { value: 'altro', label: 'Altro' },
    ],
    preselect: current.contractType,
    onSelect: 'handleContractType',
    backFn: 'showEmploymentType'
  });
}

window.handleContractType = function(value) {
  current.contractType = value;
  finishMember();
};

// --- STEP: Unemployment Type ---
function showUnemploymentType() {
  listQuestion({
    title: `${n()} sta percependo NASpI, DIS-COLL o Disoccupazione agricola?`,
    guide: 'unemployment',
    progress: 75, headerTitle: `Dati di ${n()}`,
    options: [
      { value: 'disoccupazione_con_sostegno', label: 'Sì' },
      { value: 'senza_occupazione', label: 'No' },
    ],
    preselect: current.unemploymentType,
    onSelect: 'handleUnemploymentType',
    backFn: 'showActivityType'
  });
}

window.handleUnemploymentType = function(value) {
  current.unemploymentType = value;
  finishMember();
};

// --- FINISH ---
function finishMember() {
  const finished = { ...current, complete: true };
  delete finished._editIndex;
  members.push(finished);
  current = {};
  showEmpty();
  showToast('Dati aggiunti');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Init
showEmpty();
</script>
